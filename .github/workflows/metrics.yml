name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  terminal-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: mr-cheeezz
          template: terminal
          filename: github-metrics.svg
          config_timezone: America/New_York
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          extras_css: |
            .header { background: linear-gradient(#2a313a 0%, #1f252d 100%); }
            .title { color: #e6edf3; }
            .button { background: linear-gradient(#5f6b78 0%, #3f4852 100%); }
            .button.exit { background: linear-gradient(#e06c75 0%, #be5046 100%); }
            pre { background: #0d1117; color: #d8dee9; }
            .banner, footer { color: #9aa4b2; }
            .ps1-location { color: #1793d1; }
            .ps1-path { color: #8ccf7e; }
            .diff { color: #5fa8ff; }
            .warnings { color: #d79921; }
